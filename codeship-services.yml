# Codeship Pro — definicion de servicios
# Servicio 'maven' con el JDK 17 requerido para compilar y probar la API de pedidos.
# Se monta el codigo del repositorio en /app y se cachea la imagen entre builds.

maven:
  image: maven:3.9.6-eclipse-temurin-17-alpine
  volumes:
    - ./:/app
  working_dir: /app
  cached: true

# Servicio que construye la imagen final de la aplicacion a partir del Dockerfile.
app:
  build:
    image: ci-project
    dockerfile: Dockerfile
